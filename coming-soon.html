<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coming Soon · Zoru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="case.css" />
    <style>
      /* Coming soon specific — minimal locked state */
      .cs-locked {
        min-height: 70vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 120px var(--px) 80px;
        gap: 24px;
      }
      .cs-locked__eyebrow {
        font-family: var(--f-sans);
        font-size: 10px;
        font-weight: 500;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-3);
      }
      .cs-locked__title {
        font-family: var(--f-serif);
        font-size: clamp(36px, 5vw, 72px);
        font-weight: 400;
        color: var(--ink);
        letter-spacing: -0.025em;
        line-height: 1.05;
      }
      .cs-locked__title em {
        font-style: italic;
        color: var(--accent);
      }
      .cs-locked__sub {
        font-family: var(--f-sans);
        font-size: 14px;
        color: var(--ink-3);
        max-width: 36ch;
        line-height: 1.65;
      }
      .cs-locked__back {
        font-family: var(--f-sans);
        font-size: 13px;
        font-weight: 500;
        color: var(--ink);
        border-bottom: 1px solid var(--ink);
        padding-bottom: 2px;
        margin-top: 8px;
        transition:
          color 0.2s var(--ease),
          border-color 0.2s var(--ease);
      }
      .cs-locked__back:hover {
        color: var(--accent);
        border-color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-dot" id="cursor-dot"></div>

    <nav class="nav" id="nav">
      <a href="index.html" class="nav__mark">./zoru</a>
      <div class="nav__center">
        <span class="nav__date" id="nav-date"></span>
      </div>
      <ul class="nav__links" style="margin-left: auto">
        <li><a href="about.html" class="nav__link">Profile & Work</a></li>
        <li>
          <a href="about.html#contact" class="nav__link nav__link--hi"
            >Say hi ↗</a
          >
        </li>
      </ul>
    </nav>

    <div class="cs-locked" data-reveal>
      <span class="cs-locked__eyebrow">Work in progress</span>
      <!-- REPLACE: project name in the title -->
      <h1 class="cs-locked__title">
        Something<br /><em>considered</em><br />is being built.
      </h1>
      <p class="cs-locked__sub">
        <!-- REPLACE: teaser copy for the upcoming project -->
        [One or two lines about what this project is — enough to intrigue, not
        enough to over-promise.]
      </p>
      <a href="about.html" class="cs-locked__back">← Back to all work</a>
    </div>

    <footer class="footer">
      <div class="footer__inner">
        <span class="footer__mark">./zoru</span>
        <span class="footer__copy">© 2025 — Bengaluru, India</span>
        <div class="footer__links">
          <a href="mailto:hello@zoru.design" class="footer__link">Email</a>
          <a
            href="https://linkedin.com/in/zoru"
            class="footer__link"
            target="_blank"
            rel="noopener"
            >LinkedIn</a
          >
          <a href="assets/zoru-resume.pdf" class="footer__link" download
            >Resume ↓</a
          >
        </div>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
